<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex" />
<title>AI 情報ボード</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #f4f4f2;
    --card: #ffffff;
    --ink: #2c2c2e;
    --ink-soft: #6e6e73;
    --ink-faint: #a3a3a8;
    --accent: #6f86d6;
    --accent-deep: #5165b5;
    --accent-soft: #eef0fb;
    --line: #e8e8e5;
    --radius: 18px;
    --shadow-soft: 0 1px 2px rgba(28,28,30,0.04), 0 8px 22px rgba(28,28,30,0.06);
    --shadow-lift: 0 2px 6px rgba(28,28,30,0.06), 0 16px 36px rgba(28,28,30,0.13);
    --font: "Hiragino Maru Gothic ProN", "Hiragino Maru Gothic Pro", "Zen Maru Gothic", sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    background-image: radial-gradient(circle at 50% -8%, rgba(111,134,214,0.11), transparent 55%);
    background-attachment: fixed;
    color: var(--ink);
    font-family: var(--font);
    line-height: 1.7;
    -webkit-font-smoothing: antialiased;
    padding: 0 20px 90px;
  }

  .wrap { max-width: 1080px; margin: 0 auto; }

  /* ---- masthead ---- */
  header { padding: 50px 0 26px; text-align: center; }
  .kicker {
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.22em;
    color: var(--accent-deep);
  }
  h1 {
    font-size: clamp(2.1rem, 5.5vw, 3rem);
    font-weight: 700;
    letter-spacing: 0.015em;
    margin-top: 10px;
  }
  .meta { margin-top: 14px; font-size: 13px; color: var(--ink-soft); }
  .meta b { color: var(--ink); font-weight: 500; }
  .meta .sep { color: var(--line); margin: 0 9px; }
  .meta .warn { color: #d6694e; }

  /* ---- disclaimer ---- */
  .disclaimer {
    max-width: 720px;
    margin: 0 auto 26px;
    font-size: 12.5px;
    line-height: 1.7;
    color: var(--ink-soft);
    background: var(--card);
    border-radius: 14px;
    padding: 14px 20px;
    box-shadow: var(--shadow-soft);
    text-align: center;
  }
  .disclaimer b { color: var(--ink); font-weight: 500; }

  /* ---- toolbar ---- */
  .toolbar {
    display: flex; flex-direction: column; align-items: center;
    gap: 18px; margin-bottom: 32px;
  }
  .search {
    width: 100%; max-width: 520px;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 13px 18px;
    font-family: var(--font);
    font-size: 14px;
    color: var(--ink);
    box-shadow: var(--shadow-soft);
    transition: border-color 0.15s ease, box-shadow 0.15s ease;
  }
  .search::placeholder { color: var(--ink-faint); }
  .search:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }

  /* ---- filter groups (部門 / カテゴリ) ---- */
  .filter-group {
    display: flex; flex-direction: column;
    align-items: center; gap: 9px; width: 100%;
  }
  .filter-label {
    font-size: 11px; font-weight: 500;
    letter-spacing: 0.16em; color: var(--ink-faint);
  }

  .chips { display: flex; flex-wrap: wrap; justify-content: center; gap: 9px; }
  .chip {
    font-family: var(--font);
    font-size: 12.5px; font-weight: 500;
    padding: 7px 16px;
    border: 1px solid var(--line);
    background: var(--card);
    color: var(--ink-soft);
    border-radius: 999px;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .chip:hover { color: var(--ink); border-color: #d6d6d2; }
  .chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .chip .n { opacity: 0.6; margin-left: 5px; font-weight: 400; }

  /* ---- card grid ---- */
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }

  .card {
    display: flex; flex-direction: column;
    background: var(--card);
    border-radius: var(--radius);
    padding: 22px 22px 18px;
    box-shadow: var(--shadow-soft);
    text-decoration: none;
    color: inherit;
    transition: transform 0.18s ease, box-shadow 0.18s ease;
  }
  .card.anim { animation: pop 0.5s cubic-bezier(0.22,0.61,0.36,1) both; }
  @keyframes pop { from { opacity: 0; transform: translateY(14px); } }
  a.card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lift); }

  .card .tags {
    display: flex; flex-wrap: wrap; align-items: center;
    gap: 7px; margin-bottom: 12px;
  }
  .badge {
    font-size: 10.5px; font-weight: 700;
    padding: 3px 10px; border-radius: 999px;
    background: var(--accent); color: #fff;
  }
  .cat {
    font-size: 10.5px; font-weight: 700;
    padding: 3px 10px; border-radius: 999px;
    background: var(--accent-soft); color: var(--accent-deep);
  }
  /* 部門タグ（カードに表示する控えめなアウトラインのピル） */
  .dept {
    font-size: 10px; font-weight: 500;
    padding: 2.5px 9px; border-radius: 999px;
    border: 1px solid var(--line);
    background: #fff; color: var(--ink-soft);
  }
  .src { font-size: 11.5px; color: var(--ink-faint); }

  .card h2 {
    font-size: 1.06rem; font-weight: 700;
    line-height: 1.5; margin-bottom: 9px;
    display: -webkit-box; -webkit-line-clamp: 3;
    -webkit-box-orient: vertical; overflow: hidden;
  }
  .card .summary {
    font-size: 12.5px; line-height: 1.8;
    color: var(--ink-soft);
    display: -webkit-box; -webkit-line-clamp: 4;
    -webkit-box-orient: vertical; overflow: hidden;
    flex: 1;
  }
  .card .when {
    margin-top: 14px; padding-top: 12px;
    border-top: 1px solid var(--line);
    font-size: 11px; color: var(--ink-faint);
    display: flex; gap: 9px;
  }
  .card .when .ago { color: var(--accent-deep); font-weight: 500; }

  /* ---- load more ---- */
  .more-wrap { text-align: center; margin-top: 36px; }
  .more-btn {
    font-family: var(--font);
    font-size: 14px; font-weight: 700;
    color: #fff; background: var(--accent);
    border: none; border-radius: 999px;
    padding: 13px 36px; cursor: pointer;
    box-shadow: var(--shadow-soft);
    transition: transform 0.15s ease, background 0.15s ease;
  }
  .more-btn:hover { background: var(--accent-deep); transform: translateY(-2px); }
  .more-btn .rest { opacity: 0.72; font-weight: 400; margin-left: 3px; }

  /* ---- notice / banner ---- */
  .notice { text-align: center; padding: 70px 20px; color: var(--ink-faint); font-size: 1rem; }
  .banner {
    max-width: 720px; margin: 0 auto 24px;
    background: #fff8ed; border: 1px solid #f0dcb8;
    border-radius: 14px; padding: 12px 20px;
    font-size: 12.5px; color: #8a6d3b; text-align: center;
  }

  /* ---- source status ---- */
  details.sources {
    margin-top: 48px;
    background: var(--card);
    border-radius: 14px;
    box-shadow: var(--shadow-soft);
    padding: 16px 22px;
  }
  details.sources summary {
    font-size: 12.5px; font-weight: 500;
    color: var(--ink-soft); cursor: pointer;
    list-style: none;
  }
  details.sources summary::-webkit-details-marker { display: none; }
  details.sources summary::before { content: "▸ "; color: var(--ink-faint); }
  details.sources[open] summary::before { content: "▾ "; }
  .src-grid {
    margin-top: 14px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
    gap: 8px 20px;
  }
  .src-row { font-size: 12px; display: flex; align-items: center; gap: 8px; color: var(--ink-soft); }
  .led { width: 8px; height: 8px; border-radius: 50%; flex: none; }
  .led.ok { background: #5aa86f; }
  .led.bad { background: #d6694e; }
  .src-row .cnt { margin-left: auto; color: var(--ink-faint); }

  footer {
    margin-top: 30px; text-align: center;
    font-size: 11.5px; color: var(--ink-faint); line-height: 1.8;
  }

  @media (max-width: 860px) { .grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 560px) {
    .grid { grid-template-columns: 1fr; }
    header { padding: 38px 0 20px; }
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="kicker">社内 AI インテリジェンス</div>
    <h1>AI 情報ボード</h1>
    <div class="meta" id="meta">読み込み中…</div>
  </header>

  <p class="disclaimer">
    このページは、AI関連の<b>公開情報</b>をRSSから自動収集した社内向け情報板です。
    内容は各配信元の公開情報に基づきます。詳細は必ず元記事をご確認ください。
  </p>

  <div class="toolbar">
    <input class="search" id="search" type="search" placeholder="キーワードで絞り込み（タイトル・概要・ソース）" />
    <!-- 部門フィルター（AI処理で部門タグが付いた記事がある時だけ表示） -->
    <div class="filter-group" id="dept-group" style="display:none">
      <div class="filter-label">部門</div>
      <div class="chips" id="dept-chips"></div>
    </div>
    <!-- カテゴリ（配信元の種別）フィルター -->
    <div class="filter-group">
      <div class="filter-label">カテゴリ</div>
      <div class="chips" id="chips"></div>
    </div>
  </div>

  <div id="banner-slot"></div>
  <div class="grid" id="grid"></div>
  <div class="notice" id="notice" style="display:none"></div>
  <div class="more-wrap" id="more-wrap" style="display:none">
    <button class="more-btn" id="more-btn"></button>
  </div>

  <details class="sources">
    <summary>ソースの取得状況</summary>
    <div class="src-grid" id="src-grid"></div>
  </details>

  <footer id="footer"></footer>

</div>

<script>
// data.json が読めないとき（初回公開前・プレビュー）用のサンプル
// 各記事の末尾要素は部門タグの配列。
const SAMPLE = (() => {
  const base = [
    ["国内", "ITmedia AI＋", "high", "ja", "国内主要ベンダーが生成AIの社内活用ガイドラインを公開、現場導入の指針に",
      "事務・制作・営業など部門ごとの活用例と注意点を整理した実務向けの内容。社内展開のたたき台として参照しやすい。",
      ["営業", "内部事務", "サイン"]],
    ["ニュース", "TechCrunch AI", "normal", "en", "新興スタートアップが軽量な推論モデルを発表、エッジ環境での動作を想定",
      "クラウドに依存せず端末側で動かせる小型モデル。コストとプライバシーの両面で関心を集めている。", []],
    ["企業ブログ", "OpenAI News", "high", "en", "開発者向けに新しいAPI機能を追加、長文処理とツール連携を強化",
      "より長い文脈の保持と外部ツールの呼び出しに対応。既存アプリへの組み込みが容易になるとしている。", []],
    ["研究", "arXiv cs.AI", "normal", "en", "大規模言語モデルの安全性評価に関する新しいベンチマークを提案",
      "想定外の入力に対する挙動を体系的に測る枠組み。評価指標の標準化に向けた一歩と位置づけられる。", []],
    ["国内", "ITmedia AI＋", "high", "ja", "自治体が窓口業務にAIアシスタントを試験導入、問い合わせ対応を効率化",
      "定型的な照会への一次対応をAIが担う実証。職員の負担軽減と待ち時間短縮の効果を検証する。", ["内部事務"]],
    ["ニュース", "MIT Technology Review (AI)", "normal", "en", "AIによる科学研究の加速をめぐる議論、期待と課題の両面が語られる",
      "研究プロセスのどこを自動化できるか、再現性をどう担保するかが論点として浮上している。", []],
    ["企業ブログ", "Google AI Blog", "high", "en", "マルチモーダルモデルの新版を公開、画像と文章の同時理解を改善",
      "図表を含む資料の読み取り精度が向上。業務文書の処理用途での活用が見込まれる。", ["内部事務"]],
    ["研究", "arXiv cs.LG", "normal", "en", "学習効率を高める新しい最適化手法、計算資源の削減につながる可能性",
      "同等の精度をより少ない計算で達成したと報告。再現実験での検証が今後の焦点となる。", []],
    ["ニュース", "VentureBeat AI", "normal", "en", "企業のAI導入は実証段階から本番運用へ、投資対効果の可視化が課題に",
      "試験導入は広がる一方、定量的な効果測定の難しさが多くの組織で共通の悩みとなっている。", ["営業"]],
    ["国内", "ITmedia AI＋", "normal", "ja", "国内企業がAI人材の社内育成プログラムを拡充、実務直結の研修を重視",
      "座学だけでなく自部門の課題を題材にした演習を組み込み、定着率の向上を狙う。", ["内部事務"]],
    ["企業ブログ", "Hugging Face Blog", "normal", "en", "オープンモデルのエコシステムが拡大、評価と共有の仕組みが整いつつある",
      "モデルの比較や再利用がしやすくなり、小規模チームでも検証を進めやすくなっている。", []],
    ["ニュース", "The Verge AI", "normal", "en", "生成AIの著作権をめぐる議論が継続、各国で制度整備の動きが進む",
      "学習データの扱いと生成物の権利関係について、立場の異なる主張が並行して示されている。", ["サイン"]],
    ["官公庁", "国土交通省 プレスリリース", "high", "ja", "屋外広告物の安全点検に関する手引きを改定、点検項目を明確化",
      "老朽化した看板の落下防止に向け、点検の頻度と記録の残し方の目安を示した。本設サインの管理に直結。",
      ["サイン", "営業"]],
    ["研究", "arXiv cs.AI", "normal", "en", "エージェント型AIの協調動作に関する研究、複数モデルの分担を検証",
      "タスクを分割して複数のモデルが協力する構成の有効性と限界を実験的に検討している。", []],
    ["官公庁", "デジタル庁 新着情報", "normal", "ja", "行政手続のデジタル化に関する新しい指針を公表、民間の参照も想定",
      "様式の標準化とデータ連携の考え方を整理。EC事業者の電子請求対応の参考にもなる。", ["EC", "内部事務"]]
  ];
  const departments = ["営業", "内部事務", "指令塔・第2営業", "サイン", "EC"];
  return {
    generatedAt: new Date().toISOString(),
    feedCount: 12, okCount: 11, itemCount: base.length,
    aiEnabled: true, departments: departments, excludedCount: 2,
    sources: [
      { name: "OpenAI News", ok: true, count: 2 },
      { name: "Google AI Blog", ok: true, count: 1 },
      { name: "Hugging Face Blog", ok: true, count: 1 },
      { name: "arXiv cs.AI", ok: true, count: 2 },
      { name: "arXiv cs.LG", ok: true, count: 1 },
      { name: "TechCrunch AI", ok: true, count: 1 },
      { name: "VentureBeat AI", ok: true, count: 1 },
      { name: "MIT Technology Review (AI)", ok: true, count: 1 },
      { name: "The Verge AI", ok: true, count: 1 },
      { name: "ITmedia AI＋", ok: true, count: 3 },
      { name: "国土交通省 プレスリリース", ok: true, count: 1 },
      { name: "デジタル庁 新着情報", ok: false, error: "sample" }
    ],
    items: base.map((b, i) => ({
      category: b[0], source: b[1], priority: b[2], lang: b[3],
      title: b[4], summary: b[5],
      titleJa: b[4], summaryJa: b[5],
      departments: b[6] || [],
      link: "#",
      publishedAt: new Date(Date.now() - (i * 5 + 2) * 3600e3).toISOString()
    }))
  };
})();

const INITIAL_VISIBLE = 12;
const LOAD_STEP = 12;
const state = {
  data: null,
  category: "すべて",
  department: "すべて",
  query: "",
  visible: INITIAL_VISIBLE,
  isSample: false
};

const fmtJST = (iso) =>
  new Date(iso).toLocaleString("ja-JP", {
    timeZone: "Asia/Tokyo", year: "numeric", month: "2-digit",
    day: "2-digit", hour: "2-digit", minute: "2-digit"
  });

function timeAgo(iso) {
  if (!iso) return { date: "日付不明", ago: "" };
  const diff = Date.now() - new Date(iso).getTime();
  const h = Math.floor(diff / 3600e3);
  const date = new Date(iso).toLocaleDateString("ja-JP", {
    timeZone: "Asia/Tokyo", month: "2-digit", day: "2-digit"
  });
  let ago;
  if (h < 1) ago = "たった今";
  else if (h < 24) ago = h + "時間前";
  else ago = Math.floor(h / 24) + "日前";
  return { date, ago };
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, (c) =>
    ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

function getFiltered() {
  const q = state.query.trim().toLowerCase();
  return state.data.items.filter((it) => {
    // カテゴリ絞り込み
    if (state.category !== "すべて" && it.category !== state.category) return false;
    // 部門絞り込み（記事の部門タグ配列に選択中の部門が含まれるか）
    if (state.department !== "すべて") {
      const depts = Array.isArray(it.departments) ? it.departments : [];
      if (!depts.includes(state.department)) return false;
    }
    // キーワード絞り込み（原文・日本語訳・要約・ソースをまとめて対象にする）
    if (q) {
      const hay = (
        (it.title || "") + " " + (it.titleJa || "") + " " +
        (it.summary || "") + " " + (it.summaryJa || "") + " " +
        (it.source || "")
      ).toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });
}

function cardHtml(it, i, animateFrom) {
  const t = timeAgo(it.publishedAt);
  const isNew = i >= animateFrom;
  const cls = "card" + (isNew ? " anim" : "");
  const style = isNew ? ` style="animation-delay:${Math.min((i - animateFrom) * 45, 520)}ms"` : "";
  const real = it.link && it.link !== "#";
  const open = real
    ? `<a class="${cls}"${style} href="${escapeHtml(it.link)}" target="_blank" rel="noopener">`
    : `<div class="${cls}"${style}>`;
  const close = real ? "</a>" : "</div>";

  // 表示は日本語訳を優先し、無ければ原文にフォールバックする
  const title = it.titleJa || it.title || "(無題)";
  const summaryRaw = it.summaryJa || it.summary || "";
  const summaryHtml = escapeHtml(summaryRaw).replace(/\n/g, "<br>");
  const depts = Array.isArray(it.departments) ? it.departments : [];

  return open +
    `<div class="tags">` +
      (it.priority === "high" ? `<span class="badge">重点</span>` : "") +
      `<span class="cat">${escapeHtml(it.category)}</span>` +
      depts.map((d) => `<span class="dept">${escapeHtml(d)}</span>`).join("") +
      `<span class="src">${escapeHtml(it.source)}</span>` +
    `</div>` +
    `<h2>${escapeHtml(title)}</h2>` +
    `<p class="summary">${summaryHtml}</p>` +
    `<div class="when"><span>${escapeHtml(t.date)}</span>` +
      (t.ago ? `<span class="ago">${escapeHtml(t.ago)}</span>` : "") +
    `</div>` +
    close;
}

function render(animateFrom = 0) {
  const d = state.data;

  // メタ情報
  const failed = d.feedCount - d.okCount;
  document.getElementById("meta").innerHTML =
    `最終更新 <b>${fmtJST(d.generatedAt)}</b><span class="sep">·</span>` +
    `全 <b>${d.itemCount}</b> 件<span class="sep">·</span>` +
    `ソース <b>${d.okCount}/${d.feedCount}</b> 稼働` +
    (failed > 0 ? ` <span class="warn">（${failed}件取得失敗）</span>` : "");

  // 部門チップ（AI処理で部門タグが付いた記事がある時だけ表示）
  const hasDepts = d.items.some((it) => Array.isArray(it.departments) && it.departments.length);
  const deptGroup = document.getElementById("dept-group");
  if (hasDepts) {
    deptGroup.style.display = "flex";
    const deptList = d.departments || [];
    const dcount = {};
    deptList.forEach((dep) => { dcount[dep] = 0; });
    d.items.forEach((it) => {
      (it.departments || []).forEach((dep) => {
        if (dep in dcount) dcount[dep]++;
      });
    });
    const deptChips = ["すべて", ...deptList];
    document.getElementById("dept-chips").innerHTML = deptChips.map((c) => {
      const n = c === "すべて" ? d.items.length : (dcount[c] || 0);
      return `<button class="chip${c === state.department ? " active" : ""}" data-dept="${escapeHtml(c)}">` +
        `${escapeHtml(c)}<span class="n">${n}</span></button>`;
    }).join("");
  } else {
    deptGroup.style.display = "none";
    state.department = "すべて";
  }

  // カテゴリチップ
  const counts = {};
  d.items.forEach((it) => { counts[it.category] = (counts[it.category] || 0) + 1; });
  const cats = ["すべて", ...Object.keys(counts).sort()];
  document.getElementById("chips").innerHTML = cats.map((c) => {
    const n = c === "すべて" ? d.items.length : counts[c];
    return `<button class="chip${c === state.category ? " active" : ""}" data-cat="${escapeHtml(c)}">` +
      `${escapeHtml(c)}<span class="n">${n}</span></button>`;
  }).join("");

  // 絞り込み
  const filtered = getFiltered();
  const grid = document.getElementById("grid");
  const notice = document.getElementById("notice");
  const moreWrap = document.getElementById("more-wrap");

  if (filtered.length === 0) {
    grid.innerHTML = "";
    moreWrap.style.display = "none";
    notice.style.display = "block";
    notice.textContent = "該当する記事がありません。";
  } else {
    notice.style.display = "none";
    const shown = filtered.slice(0, state.visible);
    grid.innerHTML = shown.map((it, i) => cardHtml(it, i, animateFrom)).join("");

    const remaining = filtered.length - shown.length;
    if (remaining > 0) {
      moreWrap.style.display = "block";
      document.getElementById("more-btn").innerHTML =
        `もっと見る<span class="rest">（あと ${remaining} 件）</span>`;
    } else {
      moreWrap.style.display = "none";
    }
  }

  // ソース状況
  document.getElementById("src-grid").innerHTML = (d.sources || []).map((s) =>
    `<div class="src-row"><span class="led ${s.ok ? "ok" : "bad"}"></span>` +
    `<span>${escapeHtml(s.name)}</span>` +
    `<span class="cnt">${s.ok ? s.count + "件" : "失敗"}</span></div>`
  ).join("");

  document.getElementById("footer").textContent =
    "毎日 06:17（JST）ごろに自動更新 / 取得元は feeds.json で編集可能" +
    (d.excludedCount > 0 ? ` / ネガティブ記事 ${d.excludedCount} 件を除外` : "") +
    (state.isSample ? " / 現在サンプル表示中" : "");
}

function attachEvents() {
  document.getElementById("dept-chips").addEventListener("click", (e) => {
    const btn = e.target.closest(".chip");
    if (!btn) return;
    state.department = btn.dataset.dept;
    state.visible = INITIAL_VISIBLE;
    render(0);
  });

  document.getElementById("chips").addEventListener("click", (e) => {
    const btn = e.target.closest(".chip");
    if (!btn) return;
    state.category = btn.dataset.cat;
    state.visible = INITIAL_VISIBLE;
    render(0);
  });

  let timer;
  document.getElementById("search").addEventListener("input", (e) => {
    clearTimeout(timer);
    timer = setTimeout(() => {
      state.query = e.target.value;
      state.visible = INITIAL_VISIBLE;
      render(0);
    }, 150);
  });

  document.getElementById("more-btn").addEventListener("click", () => {
    const prev = state.visible;
    state.visible += LOAD_STEP;
    render(prev);  // 既存カードは再アニメせず、追加分だけふわっと表示
  });
}

async function init() {
  attachEvents();
  try {
    const res = await fetch("./data.json", { cache: "no-store" });
    if (!res.ok) throw new Error("data.json not found");
    state.data = await res.json();
  } catch (e) {
    state.data = SAMPLE;
    state.isSample = true;
    document.getElementById("banner-slot").innerHTML =
      `<div class="banner">data.json をまだ読み込めていないため、サンプルを表示しています。` +
      `GitHub Actions が一度実行されると実データに切り替わります。</div>`;
  }
  render(0);
}

init();
</script>
</body>
</html>
